<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SHA-1 Dehasher</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <div class="container">

      <!-- Header -->
      <div class="header">
        <div class="header-left">
          <div class="header-title">
            <svg class="icon icon-pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            <h1>SHA-1_Dehasher</h1>
          </div>
          <p class="header-sub">Brute-force decryption utility // v1.0.0</p>
        </div>
        <div class="header-right">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><path d="M15 2v2M9 2v2M15 20v2M9 20v2M2 15h2M2 9h2M20 15h2M20 9h2"/></svg>
          <span>SYS_READY</span>
        </div>
      </div>

      <!-- Card -->
      <div class="card" id="main-card">
        <div class="corner corner-tl"></div>
        <div class="corner corner-tr"></div>
        <div class="corner corner-bl"></div>
        <div class="corner corner-br"></div>

        <!-- FORM VIEW -->
        <div id="view-form" class="view">

          <div class="fields">
            <div class="field">
              <label class="field-label primary">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                Target SHA-1 Hash
              </label>
              <input
                id="input-hash"
                type="text"
                class="text-input mono"
                placeholder="e.g. d033e22ae348aeb5660fc2140aec35850c4da997"
                maxlength="40"
                spellcheck="false"
                autocomplete="off"
              />
            </div>

            <div class="field">
              <label class="field-label muted">
                <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
                Known Prefix <span class="optional">(Optional)</span>
              </label>
              <input
                id="input-prefix"
                type="text"
                class="text-input mono"
                placeholder="e.g. admin_"
                spellcheck="false"
                autocomplete="off"
              />
            </div>
          </div>

          <div class="charset-section">
            <label class="field-label primary">Search Space / Character Sets</label>
            <div class="checkboxes">
              <label class="checkbox-item" id="cb-lower-label">
                <div class="checkbox-box" id="cb-lower-box"></div>
                <span class="checkbox-text">[a-z]</span>
                <input type="checkbox" id="cb-lower" checked hidden />
              </label>
              <label class="checkbox-item" id="cb-upper-label">
                <div class="checkbox-box" id="cb-upper-box"></div>
                <span class="checkbox-text">[A-Z]</span>
                <input type="checkbox" id="cb-upper" hidden />
              </label>
              <label class="checkbox-item" id="cb-numbers-label">
                <div class="checkbox-box" id="cb-numbers-box"></div>
                <span class="checkbox-text">[0-9]</span>
                <input type="checkbox" id="cb-numbers" checked hidden />
              </label>
              <label class="checkbox-item" id="cb-symbols-label">
                <div class="checkbox-box" id="cb-symbols-box"></div>
                <span class="checkbox-text">[!@#$]</span>
                <input type="checkbox" id="cb-symbols" hidden />
              </label>
            </div>
          </div>

          <div id="error-banner" class="error-banner hidden">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            <span id="error-text"></span>
          </div>

          <div class="form-footer">
            <button id="btn-start" class="btn-primary">
              <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
              Initialize Attack
            </button>
          </div>
        </div>

        <!-- RUNNING VIEW -->
        <div id="view-running" class="view hidden">
          <div class="spinner-area">
            <div class="spinner-wrap">
              <div class="spinner-ring"></div>
              <svg class="icon-lg icon-pulse" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
              <div class="spinner-orbit"></div>
              <div class="spinner-orbit orbit-2"></div>
            </div>
            <h2 class="running-title">Dehashing...</h2>
            <p class="running-sub">Brute-forcing candidate subspace</p>
            <div class="candidate-box">
              <p class="candidate-label">Current Candidate</p>
              <p class="candidate-value mono" id="current-candidate">...</p>
            </div>
            <button id="btn-stop" class="btn-abort">
              <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18"/></svg>
              Abort Sequence
            </button>
          </div>
        </div>

        <!-- RESULT VIEW -->
        <div id="view-result" class="view hidden">
          <div class="result-area">
            <div id="result-icon-found" class="result-icon found hidden">
              <svg class="icon-xl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>
            </div>
            <div id="result-icon-notfound" class="result-icon not-found hidden">
              <svg class="icon-xl" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
            <h2 id="result-title" class="result-title"></h2>
            <p id="result-sub" class="result-sub"></p>
            <div id="result-box" class="result-box hidden">
              <div class="result-corner result-corner-tl"></div>
              <p class="result-box-label">Decrypted Result</p>
              <p class="result-value mono" id="result-value"></p>
            </div>
            <button id="btn-reset" class="btn-secondary">
              <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
              Reset Tool
            </button>
          </div>
        </div>

      </div><!-- /card -->
    </div><!-- /container -->
  </div><!-- /page -->

  <script src="app.js"></script>
</body>
</html>
